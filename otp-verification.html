<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dhurandhar LMS | OTP Verification page for the Dhurandhar Enterprise LMS frontend.">
    <title>Dhurandhar LMS | OTP Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/otp-verification.css">
    <link rel="stylesheet" href="css/site-shell.css">
</head>
<body>
    <div class="auth-shell">
        <div class="container-fluid h-100">
            <div class="row g-0 min-vh-100">
                <section class="col-lg-5 auth-hero" aria-labelledby="otpHeroTitle">
                    <div class="hero-inner">
                        <div class="brand-pill" data-aos="fade-down">
                            <i class="fas fa-shield-alt"></i>
                            <span>Dhurandhar LMS</span>
                        </div>
                        <div class="hero-illustration" data-aos="zoom-in">
                            <div class="illustration-card">
                                <div class="pulse-ring"></div>
                                <div class="center-code"><i class="fas fa-key"></i></div>
                            </div>
                            <div class="floating-badge">Secure Access</div>
                        </div>
                        <div class="hero-copy" data-aos="fade-up">
                            <h1 id="otpHeroTitle">Verify your identity in seconds</h1>
                            <p>Enter the one-time code we sent to your registered email to continue your secure reset process.</p>
                        </div>
                    </div>
                </section>

                <section class="col-lg-7 auth-form-panel" aria-labelledby="otpHeading">
                    <div class="form-card" data-aos="fade-left">
                        <div class="brand-mark">D</div>
                        <h2 id="otpHeading">Enter OTP</h2>
                        <p class="form-intro">A 6-digit verification code was sent to your inbox.</p>

                        <form id="otpForm" novalidate method="post">
                            <div class="otp-group" role="group" aria-label="One-time password input">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 1" name="digit_1">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 2" name="digit_2">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 3" name="digit_3">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 4" name="digit_4">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 5" name="digit_5">
                                <input type="text" class="otp-input" inputmode="numeric" maxlength="1" aria-label="Digit 6" name="digit_6">
                            </div>

                            <div class="timer-row">
                                <span id="countdown">00:59</span>
                                <button type="button" class="resend-btn" id="resendOtpButton">Resend OTP</button>
                            </div>

                            <button type="submit" class="btn btn-primary-action" id="verifyButton">
                                <span class="btn-label">Verify OTP</span>
                                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </form>

                        <p class="switch-link"><a href="auth/login.html" class="text-link"><i class="fas fa-arrow-left"></i> Back to login</a></p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification" role="status" aria-live="polite" aria-atomic="true"></div>
<script src="js/site-shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="js/otp-verification.js"></script>
</body>
</html>
